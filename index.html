<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE LOOP - Ticket Access</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{

    background:
    radial-gradient(circle at center,#ff008c22 0%,transparent 60%),
    linear-gradient(135deg,#09000f,#1d001f,#040008);

    height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;
    align-items:center;

    color:white;
}

/* BACKGROUND */

.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.circle{
    position:absolute;
    border:1px solid rgba(255,255,255,0.05);
    border-radius:50%;
    animation:spin 25s linear infinite;
}

.circle:nth-child(1){
    width:900px;
    height:900px;
}

.circle:nth-child(2){
    width:650px;
    height:650px;
    animation-direction:reverse;
}

.circle:nth-child(3){
    width:400px;
    height:400px;
}

@keyframes spin{

from{
    transform:rotate(0deg);
}

to{
    transform:rotate(360deg);
}

}

/* GRAIN */

.grain{

    position:fixed;

    inset:0;

    pointer-events:none;

    opacity:0.08;

    background-image:
    url("https://www.transparenttextures.com/patterns/asfalt-dark.png");

    mix-blend-mode:screen;

    z-index:999;
}

/* FLASH */

.flash{

    position:fixed;

    inset:0;

    background:#ff00aa;

    opacity:0;

    pointer-events:none;

    z-index:9999;

    transition:0.15s;
}

/* MAIN */

.container{
    position:relative;
    z-index:5;
    text-align:center;
}

.small-title{

    color:#ffb4e8;

    letter-spacing:3px;

    margin-bottom:15px;

    font-size:0.9rem;
}

.title{

    font-size:5rem;

    font-weight:900;

    letter-spacing:10px;

    margin-bottom:10px;

    text-shadow:
    0 0 10px #ff00aa,
    0 0 40px #ff00aa55;
}

.subtitle{

    color:#ffb4e8;

    letter-spacing:4px;

    margin-bottom:45px;
}

/* BUTTONS */

.ticket-btn{

    padding:20px 48px;

    border:none;

    border-radius:60px;

    background:
    linear-gradient(90deg,#ff008c,#ff3ab6);

    color:white;

    font-size:1rem;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 35px #ff008c55;
}

.ticket-btn:hover{

    transform:scale(1.05);

    box-shadow:
    0 0 50px #ff00aa99;
}

.trailer-btn{

    display:inline-block;

    margin-top:18px;

    padding:12px 28px;

    border-radius:50px;

    text-decoration:none;

    color:white;

    font-size:0.78rem;

    font-weight:700;

    letter-spacing:2px;

    border:1px solid rgba(255,255,255,0.12);

    background:rgba(255,255,255,0.04);

    backdrop-filter:blur(10px);

    transition:0.3s;

    box-shadow:
    0 0 15px rgba(255,0,170,0.12);
}

.trailer-btn:hover{

    transform:scale(1.04);

    background:rgba(255,255,255,0.08);

    box-shadow:
    0 0 25px rgba(255,0,170,0.28);
}

/* MODAL */

.ticket-modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.92);

    backdrop-filter:blur(10px);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:100;
}

/* CLOSE */

.close{

    position:absolute;

    top:25px;
    right:35px;

    font-size:2rem;

    cursor:pointer;

    z-index:300;
}

/* WRAPPER */

.ticket-wrapper{

    position:relative;

    width:1200px;

    max-width:95vw;

    display:flex;

    justify-content:center;
    align-items:center;

    cursor:grab;
}

.ticket-wrapper:active{

    cursor:grabbing;
}

/* COUNTDOWN */

.countdown-screen{

    position:absolute;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.88);

    backdrop-filter:blur(12px);

    z-index:200;

    border-radius:20px;
}

.countdown-title{

    font-size:1rem;

    letter-spacing:6px;

    margin-bottom:25px;

    color:#ffb6ea;
}

.countdown{

    font-size:3rem;

    font-weight:900;

    text-shadow:
    0 0 20px #ff00aa88;
}

/* TAP TEXT */

.tear-text{

    position:absolute;

    top:-70px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:1rem;

    font-weight:700;

    letter-spacing:4px;

    text-transform:uppercase;

    padding:14px 28px;

    border-radius:50px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(8px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 0 25px #ff00aa33;

    animation:pulseText 2s infinite;

    z-index:100;

    display:none;
}

@keyframes pulseText{

0%{
    opacity:0.7;
    transform:
    translateX(-50%)
    scale(1);
}

50%{
    opacity:1;
    transform:
    translateX(-50%)
    scale(1.05);
}

100%{
    opacity:0.7;
    transform:
    translateX(-50%)
    scale(1);
}

}

/* TICKETS */

.ticket-left{

    width:78%;

    transform-origin:left center;

    z-index:10;

    opacity:0;
}

.ticket-left img{

    width:100%;
    display:block;

    clip-path: polygon(
        0% 0%,
        97% 0%,
        94% 5%,
        98% 10%,
        95% 15%,
        99% 20%,
        96% 25%,
        100% 30%,
        95% 35%,
        98% 40%,
        94% 45%,
        99% 50%,
        95% 55%,
        100% 60%,
        94% 65%,
        98% 70%,
        95% 75%,
        99% 80%,
        94% 85%,
        98% 90%,
        95% 95%,
        97% 100%,
        0% 100%
    );

    box-shadow:
    0 0 40px #ff008c44;
}

.ticket-right{

    width:22%;
    position:relative;

    opacity:0;
}

.ticket-right img{

    width:100%;
    display:block;
}

/* TEAR ANIMATION */

.ticket-wrapper.tear .ticket-left{

    animation:realPaperTear 1.6s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes realPaperTear{

0%{

    transform:
    translateX(0px)
    translateY(0px)
    rotate(0deg)
    scale(1);

    opacity:1;

    filter:blur(0px);
}

15%{

    transform:
    translateX(-8px)
    translateY(2px)
    rotate(-1deg);

}

28%{

    transform:
    translateX(18px)
    translateY(-2px)
    rotate(2deg);

}

42%{

    transform:
    translateX(-35px)
    translateY(10px)
    rotate(-5deg);

}

60%{

    transform:
    translateX(-120px)
    translateY(35px)
    rotate(-12deg)
    scale(1.02);

}

82%{

    transform:
    translateX(-240px)
    translateY(85px)
    rotate(-20deg)
    scale(1.05);

    opacity:0.75;
}

100%{

    transform:
    translateX(-380px)
    translateY(140px)
    rotate(-32deg)
    scale(1.08);

    opacity:0;

    filter:blur(10px);
}

}

/* WATCH BUTTON */

.watch-container{

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;
    align-items:center;

    opacity:0;

    transition:1s ease;

    pointer-events:none;

    z-index:50;
}

.watch-container.show{

    opacity:1;
    pointer-events:auto;
}

.watch-btn{

    padding:24px 60px;

    border-radius:60px;

    text-decoration:none;

    color:white;

    font-weight:800;

    letter-spacing:2px;

    background:
    linear-gradient(90deg,#ff008c,#742fff);

    box-shadow:
    0 0 40px #ff00aa88;

    animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
    transform:scale(1);
}

50%{
    transform:scale(1.05);
}

100%{
    transform:scale(1);
}

}

/* MOBILE */

@media(max-width:768px){

.small-title{
    font-size:0.7rem;
}

.title{
    font-size:3rem;
    letter-spacing:5px;
}

.subtitle{
    font-size:0.9rem;
}

.watch-btn{
    padding:18px 35px;
    font-size:0.9rem;
}

.tear-text{
    font-size:0.7rem;
    top:-50px;
}

.countdown{
    font-size:1.6rem;
}

}

</style>

</head>

<body>

<div class="bg">

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

</div>

<div class="grain"></div>

<div class="flash" id="flash"></div>

<div class="container">

    <div class="small-title">
        AN MGN CREATIVE ORIGINAL
    </div>

    <div class="title">
        THE LOOP
    </div>

    <div class="subtitle">
        Every Day Starts At 7:30 AM
    </div>

    <button class="ticket-btn" onclick="openTicket()">
        GET YOUR TICKET
    </button>

    <br>

    <a
    href="https://youtu.be/YOUR_TRAILER_LINK"
    target="_blank"
    class="trailer-btn">

    WATCH THE TRAILER

    </a>

</div>

<div class="ticket-modal" id="ticketModal">

    <div class="close" onclick="closeTicket()">✕</div>

    <div class="ticket-wrapper" id="ticketWrapper">

        <!-- COUNTDOWN -->

        <div class="countdown-screen" id="countdownScreen">

            <div class="countdown-title">
                THE LOOP BEGINS IN
            </div>

            <div class="countdown" id="countdown">
                00 : 00 : 00 : 00
            </div>

        </div>

        <!-- TEAR TEXT -->

        <div class="tear-text">
            TAP TO TEAR THE TICKET
        </div>

        <!-- TICKETS -->

        <div class="ticket-left">

            <img src="ticket-left.png">

        </div>

        <div class="ticket-right">

            <img src="ticket-right.png">

        </div>

        <!-- BUTTON -->

        <div class="watch-container" id="watchContainer">

            <a
            href="https://www.youtube.com/@mgncreative1539"
            target="_blank"
            class="watch-btn">

            BREAK THE LOOP

            </a>

        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="tearSound" src="TEAR.mp3"></audio>

<audio id="bgMusic" autoplay loop>
    <source src="AMBIENCE.mp3" type="audio/mpeg">
</audio>

<script>

/* ELEMENTS */

const modal=document.getElementById("ticketModal");

const wrapper=document.getElementById("ticketWrapper");

const watch=document.getElementById("watchContainer");

const bgMusic=document.getElementById("bgMusic");

const flash=document.getElementById("flash");

const countdown=document.getElementById("countdown");

const countdownScreen=document.getElementById("countdownScreen");

const leftTicket=document.querySelector(".ticket-left");

const rightTicket=document.querySelector(".ticket-right");

/* AUDIO */

bgMusic.volume=0.18;

/* RELEASE DATE */

const releaseDate = new Date("May 16, 2026 07:30:00").getTime();

/* TIMER */

const timer=setInterval(()=>{

    const now=new Date().getTime();

    const distance=releaseDate-now;

    const days=Math.floor(distance/(1000*60*60*24));

    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

    const seconds=Math.floor((distance%(1000*60))/1000);

    countdown.innerHTML=
    days+"d : "+
    hours+"h : "+
    minutes+"m : "+
    seconds+"s";

    if(distance<0){

        clearInterval(timer);

        countdownScreen.style.display="none";

        leftTicket.style.opacity="1";

        rightTicket.style.opacity="1";

        document.querySelector(".tear-text").style.display="block";
    }

},1000);

/* OPEN */

function openTicket(){

    modal.style.display="flex";

    bgMusic.play();

    if(new Date().getTime() > releaseDate){

        countdownScreen.style.display="none";

        leftTicket.style.opacity="1";

        rightTicket.style.opacity="1";

        document.querySelector(".tear-text").style.display="block";
    }

}

/* CLOSE */

function closeTicket(){

    modal.style.display="none";

    wrapper.classList.remove("tear");

    watch.classList.remove("show");

}

/* TEAR */

wrapper.addEventListener("click",()=>{

    if(new Date().getTime() < releaseDate){

        return;
    }

    if(!wrapper.classList.contains("tear")){

        document.querySelector(".tear-text").style.display="none";

        document.getElementById("tearSound").play();

        flash.style.opacity="0.35";

        setTimeout(()=>{

            flash.style.opacity="0";

        },120);

        wrapper.classList.add("tear");

        setTimeout(()=>{

            watch.classList.add("show");

        },1000);

    }

});

</script>

</body>
</html>

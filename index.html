<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE LOOP - Ticket Access</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{

    background:
    radial-gradient(circle at center,#ff008c22 0%,transparent 60%),
    linear-gradient(135deg,#09000f,#1d001f,#040008);

    height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;
    align-items:center;

    color:white;
}

/* BACKGROUND */

.bg{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.circle{
    position:absolute;
    border:1px solid rgba(255,255,255,0.05);
    border-radius:50%;
    animation:spin 25s linear infinite;
}

.circle:nth-child(1){
    width:900px;
    height:900px;
}

.circle:nth-child(2){
    width:650px;
    height:650px;
    animation-direction:reverse;
}

.circle:nth-child(3){
    width:400px;
    height:400px;
}

@keyframes spin{

from{
    transform:rotate(0deg);
}

to{
    transform:rotate(360deg);
}

}

/* MAIN */

.container{
    position:relative;
    z-index:5;
    text-align:center;
}

.small-title{

    color:#ffb4e8;

    letter-spacing:3px;

    margin-bottom:15px;

    font-size:0.9rem;
}

.title{

    font-size:5rem;

    font-weight:900;

    letter-spacing:10px;

    margin-bottom:10px;

    text-shadow:
    0 0 10px #ff00aa,
    0 0 40px #ff00aa55;
}

.subtitle{

    color:#ffb4e8;

    letter-spacing:4px;

    margin-bottom:45px;
}

/* BUTTON */

.ticket-btn{

    padding:20px 48px;

    border:none;

    border-radius:60px;

    background:
    linear-gradient(90deg,#ff008c,#ff3ab6);

    color:white;

    font-size:1rem;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 35px #ff008c55;
}

.ticket-btn:hover{

    transform:scale(1.05);

    box-shadow:
    0 0 50px #ff00aa99;
}

/* MODAL */

.ticket-modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.92);

    backdrop-filter:blur(10px);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:100;
}

/* CLOSE */

.close{

    position:absolute;

    top:25px;
    right:35px;

    font-size:2rem;

    cursor:pointer;

    z-index:300;
}

/* WRAPPER */

.ticket-wrapper{

    position:relative;

    width:1200px;

    max-width:95vw;

    display:flex;

    justify-content:center;
    align-items:center;
}
    .ticket-wrapper{

    cursor:grab;
}

.ticket-wrapper:active{

    cursor:grabbing;
}

/* TAP TEXT */

.tear-text{

    position:absolute;

    top:-70px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:1rem;

    font-weight:700;

    letter-spacing:4px;

    text-transform:uppercase;

    padding:14px 28px;

    border-radius:50px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(8px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 0 25px #ff00aa33;

    animation:pulseText 2s infinite;

    z-index:100;
}

@keyframes pulseText{

0%{
    opacity:0.7;
    transform:
    translateX(-50%)
    scale(1);
}

50%{
    opacity:1;
    transform:
    translateX(-50%)
    scale(1.05);
}

100%{
    opacity:0.7;
    transform:
    translateX(-50%)
    scale(1);
}

}

/* LEFT */

.ticket-left{

    width:78%;

    transform-origin:left center;

    z-index:10;
}

.ticket-left img{

    width:100%;
    display:block;


}

/* RIGHT */

.ticket-right{

    width:22%;
    position:relative;
}

.ticket-right img{

    width:100%;
    display:block;
}

/* PAPER TEAR */

/* REALISTIC PAPER TEAR */

.ticket-wrapper.tear .ticket-left{

    animation:realPaperTear 1.6s cubic-bezier(0.22,1,0.36,1) forwards;

}

@keyframes realPaperTear{

0%{

    transform:
    translateX(0px)
    translateY(0px)
    rotate(0deg)
    scale(1);

    opacity:1;

    filter:blur(0px);
}

/* initial pull */

15%{

    transform:
    translateX(-8px)
    translateY(2px)
    rotate(-1deg);

}

/* resistance */

28%{

    transform:
    translateX(18px)
    translateY(-2px)
    rotate(2deg);

}

/* ripping starts */

42%{

    transform:
    translateX(-35px)
    translateY(10px)
    rotate(-5deg);

}

/* aggressive tear */

60%{

    transform:
    translateX(-120px)
    translateY(35px)
    rotate(-12deg)
    scale(1.02);

}

/* flying away */

82%{

    transform:
    translateX(-240px)
    translateY(85px)
    rotate(-20deg)
    scale(1.05);

    opacity:0.75;
}

/* gone */

100%{

    transform:
    translateX(-380px)
    translateY(140px)
    rotate(-32deg)
    scale(1.08);

    opacity:0;

    filter:blur(10px);
}

}

/* WATCH BUTTON */

.watch-container{

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;
    align-items:center;

    opacity:0;

    transition:1s ease;

    pointer-events:none;

    z-index:50;
}

.watch-container.show{

    opacity:1;
    pointer-events:auto;
}

.watch-btn{

    padding:24px 60px;

    border-radius:60px;

    text-decoration:none;

    color:white;

    font-weight:800;

    letter-spacing:2px;

    background:
    linear-gradient(90deg,#ff008c,#742fff);

    box-shadow:
    0 0 40px #ff00aa88;

    animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
    transform:scale(1);
}

50%{
    transform:scale(1.05);
}

100%{
    transform:scale(1);
}

}

/* MOBILE */

@media(max-width:768px){

.small-title{
    font-size:0.7rem;
}

.title{
    font-size:3rem;
    letter-spacing:5px;
}

.subtitle{
    font-size:0.9rem;
}

.ticket-wrapper{
    width:100%;
}

.watch-btn{
    padding:18px 35px;
    font-size:0.9rem;
}

.tear-text{
    font-size:0.7rem;
    top:-50px;
}

}

</style>

</head>

<body>

<div class="bg">

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

</div>

<div class="container">

    <div class="small-title">
        AN MGN CREATIVE ORIGINAL
    </div>

    <div class="title">
        THE LOOP
    </div>

    <div class="subtitle">
        Every Day Starts At 7:30 AM
    </div>

    <button class="ticket-btn" onclick="openTicket()">
        GET YOUR TICKET
    </button>

</div>

<div class="ticket-modal" id="ticketModal">

    <div class="close" onclick="closeTicket()">✕</div>

    <div class="ticket-wrapper" id="ticketWrapper">

        <div class="tear-text">
            <p style="font-size: 7px;">
            TAP TO TEAR THE TICKET
        </div>

        <div class="ticket-left">

            <img src="ticket-left.png">

        </div>

        <div class="ticket-right">

            <img src="ticket-right.png">

        </div>

        <div class="watch-container" id="watchContainer">

            <a
            href="https://www.youtube.com/@mgncreative1539"
            target="_blank"
            class="watch-btn">

            ENTER THE LOOP

            </a>

        </div>

    </div>

</div>

<!-- SOUND -->

<audio id="tearSound" src="TEAR.mp3"></audio>

<script>

const modal=document.getElementById("ticketModal");

const wrapper=document.getElementById("ticketWrapper");

const watch=document.getElementById("watchContainer");

function openTicket(){

    modal.style.display="flex";
}

function closeTicket(){

    modal.style.display="none";

    wrapper.classList.remove("tear");

    watch.classList.remove("show");

    document.querySelector(".tear-text").style.display="block";
}

wrapper.addEventListener("click",()=>{

    if(!wrapper.classList.contains("tear")){

        document.querySelector(".tear-text").style.display="none";

        document.getElementById("tearSound").play();

        wrapper.classList.add("tear");

        setTimeout(()=>{

            watch.classList.add("show");

        },900);

    }

});

</script>

</body>
</html>
